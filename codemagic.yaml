workflows:
  ios_testflight:
    name: Cold Bore - iOS (TestFlight)

    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Cold Bore API

    environment:
      flutter: stable
      vars:
        BUNDLE_ID: com.remington.coldbore
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.remington.coldbore

    scripts:
      - name: Pub get
        script: flutter pub get

      - name: Analyze (non-blocking)
        script: flutter analyze || true

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch App Store signing files
        script: app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply iOS signing settings
        script: xcode-project use-profiles

      - name: Build IPA (Release)
        script: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BUILD_NAME=${APP_VERSION%%+*}
          BUILD_NUMBER=${APP_VERSION##*+}
          echo "Building iOS with version ${BUILD_NAME}+${BUILD_NUMBER}"
          flutter build ipa --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"


    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
